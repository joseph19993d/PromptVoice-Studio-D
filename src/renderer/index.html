<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; media-src 'self' blob: data:;" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <title>PromptVoice Studio</title>
</head>

<body>
  <script>
    window.addEventListener('error', (event) => {
      document.body.innerHTML += `<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;width:100%;font-family:monospace;font-size:18px;white-space:pre-wrap;"><h1>App Crashed!</h1><p>${event.error?.message || event.message}</p><p>${event.error?.stack}</p></div>`;
    });
  </script>
  <div id="root"></div>
  <script type="module" src="./src/main.tsx"></script>
</body>

</html>
